tags:
  - User

description:
  Update a current user's profile. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
          example: Anna
        lastName:
          type: string
          example: Smith
        password:
          type: string
          format: password
          minLength: 8
          example: 123456Qq.
        passwordRepeated:
          type: string
          format: password
          minLength: 8
          example: 123456Qq.


responses:
  200:
    description: User profile updated successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: User profile updated successfully
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: test@mail.com
            emailVerified:
              type: boolean
              example: false
            firstName:
              type: string
              example: Anna
            lastName:
              type: string
              example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
  401:
    description: Unauthorized (missing or invalid token)
  422:
    description: Invalid token format
  429:
    description: Too many requests
  500:
    description: Internal server error