tags:
  - User

description:
  Get current user's profile. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  200:
    description: User profile retrieved successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: This is protected data
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: test@mail.com
            emailVerified:
              type: boolean
              example: false
            firstName:
              type: string
              example: Anna
            lastName:
              type: string
              example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
  401:
    description: Unauthorized (missing or invalid token)
  422:
    description: Invalid token format
  500:
    description: Internal server error