tags:
  - Project

description:
  Delete a specific project that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: projectId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the project to delete

responses:
  204:
    description: Project deleted successfully
  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Invalid token format
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)