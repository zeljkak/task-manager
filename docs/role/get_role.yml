tags:
  - Role

description:
  Get a specific role that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: roleId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the role to retrieve

responses:
  200:
    description: Role retrieved successfully
    schema:
      type: object
      properties:
        role:
          type: object
          properties:
            id:
              type: integer
              example: 2
            roleName:
              type: string
              example: user

  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Priority not found
  422:
    description: Invalid token format
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)