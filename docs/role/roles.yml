tags:
  - Role

description:
  Get all roles. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  200:
    description: Roles retrieved successfully
    schema:
      type: object
      properties:
        roles:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 2
              name:
                type: string
                example: user

  401:
    description: Unauthorized (missing or invalid token)
  422:
    description: Invalid token format
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)