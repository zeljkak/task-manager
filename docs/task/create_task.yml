tags:
  - Task

description: Create a new task.

security:
  - BearerAuth: []

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Implement login endpoint
        description:
          type: string
          example: Create JWT authentication and validation.
        assignedToId:
          type: integer
          example: 3
          description: Defaults to the authenticated user if not provided.
        statusId:
          type: integer
          example: 2
        priorityId:
          type: integer
          example: 1
        dueDate:
          type: string
          format: date
          example: "2027-05-20"
        estimatedHours:
          type: integer
          example: 6

responses:
  201:
    description: Task created successfully
  400:
    description: Bad request (missing or invalid fields)
  401:
    description: Authentication required
  404:
    description: Related resource not found
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)