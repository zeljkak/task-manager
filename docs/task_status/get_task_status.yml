tags:
  - Task Status

description:
  Get a specific task status that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: taskStatusId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the task status to retrieve

responses:
  200:
    description: Task status retrieved successfully
    schema:
      type: object
      properties:
        taskStatus:
          type: object
          properties:
            id:
              type: integer
              example: 2
            status:
              type: string
              example: To Do

  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Invalid token format
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)