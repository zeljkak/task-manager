tags:
  - User

description:
  Update a specific users role. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: userId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the user to update
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - roleName
      properties:
        roleName:
          type: string
          example: user
responses:
  200:
    description: User role updated successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: User role updated successfully
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: test@mail.com
            emailVerified:
              type: boolean
              example: false
            firstName:
              type: string
              example: Anna
            lastName:
              type: string
              example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            roleId:
              type: integer
              example: 1
            followedTasks:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: Implement login endpoint
                  assignedTo:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith
  401:
    description: Unauthorized (missing or invalid token)
  422:
    description: Invalid token format
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)