tags:
  - User

description:
  Delete the users profile. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  204:
    description: User deleted successfully
  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)