tags:
  - Project

description:
  Archive a specific project that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: projectId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the project to archive

responses:
  200:
    description: Project archived successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Project archived successfully
        project:
          type: object
          properties:
            id:
              type: integer
              example: 2
            projectName:
              type: string
              example: Second project
            projectDescription:
              type: string
              example: Important - This project can be used as a client dashboard. All tasks relating to the specific client are connected to it.
            archived:
              type: boolean
              example: True
            createdBy:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            updatedBy:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            updatedAt:
              type: datetime
              example: "2026-05-30T13:54:55.729333+02:00"
            attachments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  fileUrl:
                    type: string
                    example: "http://localhost:5000/uploads/abc123_design.pdf"
                  fileName:
                    type: string
                    example: "design.pdf"
                  fileType:
                    type: string
                    example: "application/pdf"
                  createdAt:
                    type: datetime
                    example: "2026-08-28T13:54:55.729333+02:00"
                  createdBy:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith
  400:
    description: Bad request (state unchanged)
  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  404:
    description: Related resource not found
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)