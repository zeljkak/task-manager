tags:
  - Project

description: Create a new project.

security:
  - BearerAuth: []

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - project_name
      properties:
        projectName:
          type: string
          example: Second project
        projectDescription:
          type: string
          example: This project can be used as a client dashboard. All tasks relating to the specific client are connected to it.

responses:
  201:
    description: Project created successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Project created successfully
        project:
          type: object
          properties:
            id:
              type: integer
              example: 1
            projectName:
              type: string
              example: Second project
            projectDescription:
              type: string
              example: This project can be used as a client dashboard. All tasks relating to the specific client are connected to it.
            createdBy:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            updatedBy:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            updatedAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            attachments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  fileUrl:
                    type: string
                    example: "http://localhost:5000/uploads/abc123_design.pdf"
                  fileName:
                    type: string
                    example: "design.pdf"
                  fileType:
                    type: string
                    example: "application/pdf"
                  createdAt:
                    type: datetime
                    example: "2026-08-28T13:54:55.729333+02:00"
                  createdBy:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith

  400:
    description: Bad request (missing or invalid fields)
  401:
    description: Authentication required
  403:
    description: Forbidden (unallowed action)
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)