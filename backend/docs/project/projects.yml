tags:
  - Project

description:
  Retrieve projects. Results can be filtered by name, description, creator and date of creation. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: projectText
    in: query
    required: false
    type: string
    example: Second project
    description: Name or description of the project to filter by
  - name: createdById
    in: query
    required: false
    type: integer
    example: 1
    description: ID of the user to filter by
  - name: createdBefore
    in: query
    required: false
    type: string
    format: date
    example: "2026-06-27T22:00:00.000Z"
    description: Creation date of the project to filter by
  - name: createdAfter
    in: query
    required: false
    type: string
    format: date
    example: "2026-06-27T22:00:00.000Z"
    description: Creation date of the project to filter by

responses:
  200:
    description: Projects retrieved successfully
    schema:
      type: object
      properties:
        projects:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 2
              projectName:
                type: string
                example: Second project
              projectDescription:
                type: string
                example: This project can be used as a client dashboard. All tasks relating to the specific client are connected to it.
              archived:
                type: boolean
                example: False
              createdBy:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
              updatedBy:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
              createdAt:
                type: datetime
                example: "2026-05-28T13:54:55.729333+02:00"
              updatedAt:
                type: datetime
                example: "2026-05-28T13:54:55.729333+02:00"
              attachments:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    fileUrl:
                      type: string
                      example: "http://localhost:5000/uploads/abc123_design.pdf"
                    fileName:
                      type: string
                      example: "design.pdf"
                    fileType:
                      type: string
                      example: "application/pdf"
                    createdAt:
                      type: datetime
                      example: "2026-08-28T13:54:55.729333+02:00"
                    createdBy:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstName:
                          type: string
                          example: Anna
                        lastName:
                          type: string
                          example: Smith

  401:
    description: Unauthorized (missing or invalid token)
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)