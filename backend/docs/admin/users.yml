tags:
  - Admin

description:
  Get all users. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  200:
    description: Users retrieved successfully
    schema:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              email:
                type: string
                example: test@mail.com
              emailVerified:
                type: boolean
                example: false
              firstName:
                type: string
                example: Anna
              lastName:
                type: string
                example: Smith
              createdAt:
                type: datetime
                example: "2026-05-28T13:54:55.729333+02:00"
              roleId:
                type: integer
                example: 2
              isDeleted:
                type: boolean
                example: false
              followedTasks:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: Implement login endpoint
                    assignedTo:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstName:
                          type: string
                          example: Anna
                        lastName:
                          type: string
                          example: Smith
  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)