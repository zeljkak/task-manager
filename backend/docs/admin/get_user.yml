tags:
  - Admin

description:
  Get a specific user that matches the ID. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: userId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the user to retrieve
responses:
  200:
    description: User retrieved successfully
    schema:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: test@mail.com
            emailVerified:
              type: boolean
              example: false
            firstName:
              type: string
              example: Anna
            lastName:
              type: string
              example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            roleId:
              type: integer
              example: 2
            followedTasks:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: Implement login endpoint
                  assignedTo:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith
  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  404:
    description: Related resource not found
  422:
    description: Validation error
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)