tags:
  - Task

description:
  Create a relation between two tasks. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: taskId
    in: path
    required: true
    type: integer
    example: 2
    description: ID of the first task in a relation
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - relatedTaskId
      properties:
        relatedTaskId:
          type: integer
          example: 3
responses:
  200:
    description: Relation created successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Relation created successfully
        task:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              related:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 3
                    title:
                      type: string
                      example: Finish adding routes
                    assignedTo:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstName:
                          type: string
                          example: Anna
                        lastName:
                          type: string
                          example: Smith
  400:
    description: Bad request (relation already exists)
  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Validation error
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)