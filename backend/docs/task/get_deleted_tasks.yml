tags:
  - Task

description:
  Get all deleted tasks. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  200:
    description: Tasks retrieved successfully
    schema:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              title:
                type: string
                example: Implement login endpoint
              description:
                type: string
                example: Create JWT authentication and validation.
              assignedTo:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
              statusId:
                type: integer
                example: 2
              priority:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2
                  level:
                    type: string
                    example: medium
              project:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  projectName:
                    type: string
                    example: Example Project
                  projectDescription:
                    type: string
                    example: This is an example of a project. It can be renamed or deleted.
              dueDate:
                type: string
                format: date
                example: "2027-05-20"
              estimatedHours:
                type: integer
                example: 6
              createdAt:
                type: datetime
                example: "2026-05-20T13:28:47.101083+02:00"
              createdBy:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
              followers:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    firstName:
                      type: string
                      example: Anna
                    lastName:
                      type: string
                      example: Smith
              related:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 3
                    title:
                      type: string
                      example: Finish adding routes
                    assignedTo:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstName:
                          type: string
                          example: Anna
                        lastName:
                          type: string
                          example: Smith

  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)