tags:
  - Task

description:
  Get related tasks for a specific task. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: taskId
    in: path
    required: true
    type: integer
    example: 2
    description: ID of the task in a relation

responses:
  200:
    description: Related tasks retrieved successfully
    schema:
      type: object
      properties:
        task:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              related:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 3
                    title:
                      type: string
                      example: Finish adding routes
                    assignedTo:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstName:
                          type: string
                          example: Anna
                        lastName:
                          type: string
                          example: Smith
  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Validation error
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)