tags:
  - Task

description: Create a new task.

security:
  - BearerAuth: []

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Implement login endpoint
        description:
          type: string
          example: Create JWT authentication and validation.
        assignedToId:
          type: integer
          example: 3
          description: Defaults to the authenticated user if not provided.
        statusId:
          type: integer
          example: 2
        priorityId:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
        dueDate:
          type: string
          format: date
          example: "2027-05-20"
        estimatedHours:
          type: integer
          example: 6

responses:
  201:
    description: Task created successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Task created successfully
        task:
          type: object
          properties:
            id:
              type: integer
              example: 1
            title:
              type: string
              example: Implement login endpoint
            description:
              type: string
              example: Create JWT authentication and validation.
            assignedTo:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            statusId:
              type: integer
              example: 2
            priority:
              type: object
              properties:
                id:
                  type: integer
                  example: 2
                level:
                  type: string
                  example: medium
            project:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                projectName:
                  type: string
                  example: Example Project
                projectDescription:
                  type: string
                  example: This is an example of a project. It can be renamed or deleted.
                archived:
                  type: boolean
                  example: False
            dueDate:
              type: string
              format: date
              example: "2027-05-20"
            estimatedHours:
              type: integer
              example: 6
            createdAt:
              type: datetime
              example: "2026-05-12 11:30:30.97232+02"
            createdBy:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            followers:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
            related:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 3
                  title:
                    type: string
                    example: Finish adding routes
                  assignedTo:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith
            attachments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  fileUrl:
                    type: string
                    example: "http://localhost:5000/uploads/abc123_design.pdf"
                  fileName:
                    type: string
                    example: "design.pdf"
                  fileType:
                    type: string
                    example: "application/pdf"
                  createdAt:
                    type: datetime
                    example: "2026-08-28T13:54:55.729333+02:00"
                  createdBy:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: Anna
                      lastName:
                        type: string
                        example: Smith
  400:
    description: Bad request (missing or invalid fields)
  401:
    description: Authentication required
  404:
    description: Related resource not found
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)