tags:
  - Task

description:
  Follow/unfollow a specific task that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: taskId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the task to follow/unfollow

responses:
  200:
    description: Task following updated
    schema:
      type: object
      properties:
        task:
          type: object
          properties:
            id:
              type: integer
              example: 1
            followers:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  firstName:
                    type: string
                    example: Anna
                  lastName:
                    type: string
                    example: Smith
  400:
    description: Bad request (state hasn't changed)
  401:
    description: Unauthorized (missing or invalid token)
  404:
    description: Related resource not found
  422:
    description: Validation error
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)