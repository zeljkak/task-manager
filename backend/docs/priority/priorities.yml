tags:
  - Priority

description:
  Get all priorities. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

responses:
  200:
    description: Priorities retrieved successfully
    schema:
      type: object
      properties:
        priorities:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              level:
                type: string
                example: low

  401:
    description: Unauthorized (missing or invalid token)
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)