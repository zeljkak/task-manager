tags:
  - Comment

description:
  Update a specific comment that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: commentId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the comment to update
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string
          example: Implemented login endpoint successfully

responses:
  200:
    description: Comment updated successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Comment updated successfully
        comment:
          type: object
          properties:
            id:
              type: integer
              example: 1
            comment:
              type: string
              example: Finished creating task routes successfully
            taskId:
              type: integer
              example: 3
            user:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                firstName:
                  type: string
                  example: Anna
                lastName:
                  type: string
                  example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            updatedAt:
              type: datetime
              example: "2026-05-29T13:54:55.729333+02:00"
  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  404:
    description: Related resource not found
  422:
    description: Validation error
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)