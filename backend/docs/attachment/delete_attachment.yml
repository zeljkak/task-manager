tags:
  - Attachment

description:
  Delete a specific attachment that matches the id. Requires a valid JWT token in Authorization header. Format: Bearer <token>

security:
  - BearerAuth: []

parameters:
  - name: attachmentId
    in: path
    required: true
    type: integer
    example: 1
    description: ID of the attachment to delete

responses:
  204:
    description: Attachment deleted successfully
  401:
    description: Unauthorized (missing or invalid token)
  403:
    description: Forbidden (unallowed action)
  404:
    description: Related resource not found
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)