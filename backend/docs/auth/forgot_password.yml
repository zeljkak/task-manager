tags:
  - Auth

description: Request a reset password email.

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: test@mail.com
responses:
  200:
    description: Reset password email has been sent
    schema:
      type: object
      properties:
        message:
          type: string
          example: Reset password email sent
  400:
    description: Bad request (missing or invalid fields)
  422:
    description: Validation error (invalid email format)
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)