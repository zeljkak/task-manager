tags:
  - Auth

description: Reset a users password. New password entries must match.

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - password
        - passwordRepeated
      properties:
        password:
          type: string
          format: password
          minLength: 8
          example: 123456Ww.
        passwordRepeated:
          type: string
          format: password
          minLength: 8
          example: 123456Ww.
responses:
  200:
    description: Password updated successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Password updated successfully
  400:
    description: Bad request (missing or invalid fields)
  422:
    description: Validation error (invalid email format, weak password, etc.)
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)