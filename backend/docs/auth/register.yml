tags:
  - Auth

description: Register a new user. Email must be unique. Password must be at least 8 characters long. Password must contain at least one uppercase letter, one lowercase letter, one number and one special character (!@#$%^&*()_-+={[}]|\:;"'<,>.?/)

parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          example: Anna
        lastName:
          type: string
          example: Smith
        email:
          type: string
          format: email
          example: test@mail.com
          description: Must be unique. Duplicate emails are not allowed.
        password:
          type: string
          format: password
          minLength: 8
          example: 123456Yy.
        passwordRepeated:
          type: string
          format: password
          minLength: 8
          example: 123456Yy.
responses:
  201:
    description: User registered successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: test@mail.com
            emailVerified:
              type: boolean
              example: false
            firstName:
              type: string
              example: Anna
            lastName:
              type: string
              example: Smith
            createdAt:
              type: datetime
              example: "2026-05-28T13:54:55.729333+02:00"
            roleId:
              type: integer
              example: 2
  400:
    description: Bad request (missing or invalid fields)
  409:
    description: User already exists (email must be unique)
  422:
    description: Validation error (invalid email format, weak password, etc.)
  429:
    description: Too many requests
  500:
    description: Internal server error
  503:
    description: Service unavailable (database or email service down)